# Temel webserv yapılandırma dosyası örneği

server {
    # 1. Sunucunun dinleyeceği arayüz ve port
    listen 127.0.0.1:8080;

    # İsteğe bağlı sanal sunucu ismi
    server_name example.local;

    # 2. İstemci istek gövdeleri için maksimum boyut
    client_max_body_size 10M;

    # 3. Varsayılan hata sayfaları
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;

    # 4. Route: Kök dizin ve genel kurallar
    location / {
        allow_methods GET POST;
        root /var/www/html;
        index index.html default.html;
        autoindex off;
    }

    # 5. Route: Dizin listeleme (Directory listing) açık olan bir dizin
    location /assets {
        allow_methods GET;
        root /var/www/assets;
        autoindex on;
    }

    # 6. Route: HTTP Yönlendirmesi (Redirection)
    location /old-page {
        return 301 /new-page;
    }

    # 7. Route: Dosya yükleme (Upload) yetkisi
    location /upload {
        allow_methods POST GET DELETE;
        root /var/www/uploads;
        upload_enable on;
        upload_store /var/www/uploads/temp;
    }

    # 8. Route: CGI Çalıştırılması (örn. PHP)
    location /cgi-bin {
        allow_methods GET POST;
        root /var/www/cgi-bin;
        cgi_ext .php;
        cgi_path /usr/bin/php-cgi;
    }
}

# Farklı bir portta dinleyen ikinci bir sunucu bloğu (Multiple servers)
server {
    listen 0.0.0.0:9090;
    server_name second-app.local;
    client_max_body_size 1M;

    location / {
        allow_methods GET;
        root /var/www/second_app;
        index home.html;
    }
}
